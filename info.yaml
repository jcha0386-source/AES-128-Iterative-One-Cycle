yaml_version: 6

# Tiny Tapeout project information
project:
  title:        "Iterative AES-128 Core"
  author:       "Jiun Yu"
  discord:      ""
  description:  "An iterative AES-128 hardware accelerator utilizing 8-bit stream serialization."
  language:     "Verilog"
  clock_hz:     10000000
  tiles:        "6x2"
  top_module:   "tt_um_aes_128_wrapper"
  wokwi_id:     0
  source_files:
    - "tt_um_aes_128_wrapper.v"
    - "aes_top.v"
    - "key_expansion.v"
    - "mixcolumns.v"
    - "mixcolumns_one_column.v"
    - "sbox.v"
    - "shiftrows.v"
    - "subbytes.v"

# The pinout of your project.
pinout:
  # Inputs
  ui[0]: "data_in[0]"
  ui[1]: "data_in[1]"
  ui[2]: "data_in[2]"
  ui[3]: "data_in[3]"
  ui[4]: "data_in[4]"
  ui[5]: "data_in[5]"
  ui[6]: "data_in[6]"
  ui[7]: "data_in[7]"

  # Outputs
  uo[0]: "data_out[0]"
  uo[1]: "data_out[1]"
  uo[2]: "data_out[2]"
  uo[3]: "data_out[3]"
  uo[4]: "data_out[4]"
  uo[5]: "data_out[5]"
  uo[6]: "data_out[6]"
  uo[7]: "data_out[7]"

  # Bidirectional pins
  uio[0]: "busy"
  uio[1]: "done"
  uio[2]: "start"
  uio[3]: "load_ptext"
  uio[4]: "load_key"
  uio[5]: "byte_idx[0]"
  uio[6]: "byte_idx[1]"
  uio[7]: "byte_idx[2]"
